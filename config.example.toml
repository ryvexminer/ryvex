# ============================================================
# Ryvex — Configuration
# Copy this file to config.toml and adjust the values
# ============================================================

# Worker name (identifies this miner on the pool)
worker_name = "rig1"

# Mining algorithm — supported values: "kawpow" (RVN), "autolykos2" (ERG), "fishhash" (IRON)
algorithm = "kawpow"

# === Mining Pools ===
# The first pool is the primary, the rest are backups (failover).
# If the primary pool is unreachable, the miner automatically tries the next ones.

# Wallets can be encrypted with --encrypt-config --config-key PASSWORD
# An encrypted wallet looks like: "enc:base64..."
# To decrypt at launch: --config-key PASSWORD or env RYVEX_CONFIG_KEY

# --- Ravencoin (KawPoW) ---

# Ravencoin (KawPoW) — 2miners primary (TCP)
[[pools]]
url = "rvn.2miners.com:15555"
wallet = "YOUR_RAVENCOIN_WALLET_HERE"
password = "x"
tls = false
is_backup = false
# coin = "RVN"            # optional: coin symbol mined on this pool. One algorithm
#                         # can serve several coins (e.g. KawPoW on zpool: RVN, MEWC,
#                         # NEOX, AIPG...). Defaults to the algorithm's canonical coin.
# api_url = "https://rvn.2miners.com/api/accounts/YOUR_WALLET"
#                         # optional: pool HTTP API for pool-reported hashrate + balance,
#                         # polled every 60s. See the "Pool HTTP API" section below.

# Ravencoin (KawPoW) — HeroMiners backup (SSL)
[[pools]]
url = "ravencoin.herominers.com:10641"
wallet = "YOUR_RAVENCOIN_WALLET_HERE"
password = "x"
tls = true
is_backup = true

# TLS pool example (stratum+ssl://)
# The stratum+ssl:// prefix automatically enables TLS even if tls = false
# [[pools]]
# url = "stratum+ssl://rvn.2miners.com:16060"
# wallet = "YOUR_RAVENCOIN_WALLET_HERE"
# password = "x"
# tls = true
# ssl_verify = true       # false = accept self-signed certificates
# is_backup = true

# --- Ergo (Autolykos2) — uncomment and set algorithm = "autolykos2" ---
# [[pools]]
# url = "stratum+ssl://erg.2miners.com:8088"
# wallet = "YOUR_ERGO_WALLET_HERE"
# password = "x"
# tls = true
# is_backup = false
# # 2miners ERG uses a high baseline difficulty — pre-set to avoid rejected shares at startup:
# # [mining.tuning]
# # target_multiplier = 4.0

# [[pools]]
# url = "stratum+ssl://ergo.herominers.com:10250"
# wallet = "YOUR_ERGO_WALLET_HERE"
# password = "x"
# tls = true
# is_backup = true

# --- IronFish (FishHash) — uncomment and set algorithm = "fishhash" ---
# [[pools]]
# url = "stratum+ssl://ironfish.herominers.com:10370"
# wallet = "YOUR_IRONFISH_WALLET_HERE"
# password = "x"
# tls = true
# is_backup = false

# [[pools]]
# url = "stratum+ssl://ironfish.pool.2miners.com:20300"
# wallet = "YOUR_IRONFISH_WALLET_HERE"
# password = "x"
# tls = true
# is_backup = true

# === GPU Configuration ===
[gpu]
# GPU indices to use (empty = all detected GPUs)
# Example: [0, 1] to use the first 2 GPUs
# Each GPU launches an independent worker connected to the pool
devices = []

# Mining intensity (0.0 to 1.0)
# 1.0 = full power, 0.5 = half power (reduces temperature)
intensity = 1.0

# Thermal protection: pause mining when GPU reaches temp_stop (°C)
# Mining resumes when temperature drops to temp_start (°C)
# 0 = disabled (default: built-in 85/75°C safety limit still active)
# temp_stop = 80
# temp_start = 70

# Hashrate watchdog: restart GPU worker if 5-min average drops below this (H/s)
# Useful to detect stuck GPUs or driver crashes. 0 = disabled.
# Example: 20000000 = 20 MH/s
# min_hashrate = 0

# === Logging ===
[logging]
# Log level: "trace", "debug", "info", "warn", "error"
level = "info"

# Write logs to a file (optional, uncomment to enable)
# file = "ryvex.log"

# === Web Dashboard ===
[dashboard]
# Enable web dashboard (accessible via browser at http://localhost:8081)
enabled = true

# Dashboard port (0 to disable)
port = 8081

# API key to protect dashboard access (optional)
# If set, requests must include ?key=YOUR_KEY or the X-API-Key header
# api_key = "a-random-secret-key"

# HTTP API bind address (default: "127.0.0.1" = local only)
# Set to "0.0.0.0" to listen on all interfaces (multi-rig LAN monitoring)
# bind_address = "0.0.0.0"

# Static API token for remote access (optional)
# If empty or absent, a random token is generated each session.
# A static token allows remote GUIs to reconnect after a reboot.
# Generate a token: openssl rand -hex 32
# api_token = "your-secret-token-here"

# === Network Timeouts ===
[timeouts]
# Pool connection timeout in seconds (default: 10)
pool_connect_secs = 10
# Pool message receive timeout in seconds (default: 2)
pool_recv_secs = 2

# === Multi-pool Failover ===
[failover]
# When the miner is on a backup pool, check interval for the primary
# pool in seconds (default: 60). If the primary comes back,
# the miner switches automatically.
primary_check_interval_secs = 60
# If the pool sends no messages during this delay (in seconds),
# it is considered silent and the miner triggers a failover.
# Active pools send mining.notify every ~15-30s.
silence_timeout_secs = 90

# === Mining ===
[mining]
# Verify GPU shares on CPU before submitting (avoids invalid shares)
cpu_check = true
# Electricity cost per kWh (for profit display in stats and summary)
electricity_cost = 0.15
# Currency symbol for electricity cost display
# Examples: "USD", "EUR", "GBP", "JPY", "CNY", "CAD", "AUD"
electricity_currency = "USD"
# DAG cache: keep old DAG while generating new one ("auto", "true", "false")
# Auto enables on GPUs with 12GB+ VRAM
dag_cache = "auto"
# Save DAG to disk for fast reload on next startup
# Location: %LOCALAPPDATA%/ryvex/dag-cache/ (Windows) or ~/.local/share/ryvex/dag-cache/ (Linux)
dag_cache_save = true
# Benchmark duration in seconds (used with --benchmark flag)
benchmark_duration_secs = 60

# === Advanced Tuning (optional) ===
# Most users should leave defaults — Ryvex auto-tunes for your GPU.
# Only modify if you know what you're doing.
# [mining.tuning]
# kawpow_burst = 1            # CUDA kernels queued before sync (1-4, higher = more throughput, >2 risks TDR on Windows)
# kawpow_grid_mult = 12       # Grid multiplier for CUDA launches (default 12, clamped to 16)
# kawpow_precompile = true    # Pre-compile next ProgPoW period kernel in background (eliminates 10-15s stall)
# kawpow_cpu_verify = "adaptive"  # CPU share verification: "adaptive" (default), "always", "off"
# dag_verify = false          # Heavy DAG integrity check after generation (~60s, for diagnosing VRAM corruption under OC)
#
# target_multiplier = 1.0     # Scales the local share target sent to the pool (default: 1.0, auto-adjusts on reject).
#                             # Increase when the pool's baseline difficulty is much higher than the binary's default
#                             # assumption — avoids 2-3 rejected shares at session start while the auto-ladder catches up.
#                             # Recommended values by pool category:
#                             #   1.0  — most pools (NiceHash, HeroMiners, WoolyPooly, Nanopool)
#                             #   4.0  — 2miners ERG (Autolykos2) high-diff sessions
#                             #   8.0  — ultra-high-diff sessions (rare)
